<!DOCTYPE html>
<html lang="tr">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>bira.</title>
	<link rel="stylesheet" href="/css/style.css">
	<script>
		// Sayfa yüklenirken "Giriş Yap" butonunun 1 saniye görünüp kaybolmasını (flicker) önlemek için
		// Supabase SDK'sı yüklenmeden önce localStorage durumunu senkronize olarak kontrol ediyoruz:
		(function() {
			try {
				let cachedProfile = null;
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key.startsWith('user_profile_')) {
						cachedProfile = localStorage.getItem(key);
						break;
					}
				}
				const hasSession = localStorage.getItem('sb-qryjfafoimjcwcuruzah-auth-token');
				
				if (hasSession && cachedProfile) {
					const profile = JSON.parse(cachedProfile);
					// HTML elementine sınıf ekleyerek CSS üzerinden buton görünümünü anında kilitliyoruz
					document.documentElement.classList.add('preload-logged-in');
					
					// DOM hazır olduğunda verileri anında elementlere yazıyoruz (Supabase JS yüklenmesini beklemeden)
					document.addEventListener('DOMContentLoaded', () => {
						document.getElementById('userName').innerText = profile.display_name;
						document.getElementById('userAvatar').src = profile.avatar_url;
					});
				} else {
					document.documentElement.classList.add('preload-logged-out');
				}
			} catch (e) {
				console.error("Lokal oturum kontrolü sırasında hata:", e);
			}
		})();
	</script>
</head>

<body>

	<header>
		<div class="logo-container">
			<div class="fire" id="fire"></div>
			<div class="logo">bira</div>
		</div>
		<button class="btn-twitter" id="loginBtn">
			<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
				<path
					d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z" />
			</svg>
			<span id="loginText">Twitter ile Giriş Yap</span>
		</button>

		<div class="user-container" id="userContainer" style="display: none;">
			<span class="user-name" id="userName"></span>
			<div class="user-avatar-wrapper">
				<img class="user-avatar" id="userAvatar" src="" alt="Profil Resmi">
			</div>
			<button class="btn-logout" id="logoutBtn" title="Çıkış Yap">
				<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
					<path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
				</svg>
			</button>
		</div>
	</header>

	<script type="module" src="/js/app.js"></script>
</body>

</html>
